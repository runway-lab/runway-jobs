name: Validate Jobs

on:
  pull_request:
    paths:
      - "jobs/**"
      - "policies/**"
      - "schemas/**"
      - "scripts/**"
      - ".github/workflows/validate-job.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validators
        run: python -m pip install pyyaml jsonschema
      - name: Validate job specs
        run: python scripts/validate_jobs.py
