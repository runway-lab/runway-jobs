name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-and-policy:
    name: schema + policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest

      - name: Run validator unit tests
        run: python -m pytest tests/ -q

      - name: Validate job specs
        env:
          # On pull_request events, files this PR adds/modifies must
          # declare metadata.owner == the PR author. Pre-existing specs
          # on main are NOT re-checked against the current PR author
          # (they were verified when their own PR landed).
          VALIDATOR_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "${PR_NUMBER:-}" ]; then
            mapfile -t changed < <(
              gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
                --paginate \
                --jq '.[] | select(.status == "added" or .status == "modified") | select(.filename | startswith("jobs/")) | .filename'
            )
            for f in "${changed[@]}"; do
              [ -z "$f" ] && continue
              args+=(--pr-changed "$f")
            done
          fi
          python scripts/validate_jobs.py "${args[@]}"

      - name: Validate example
        run: python scripts/validate_jobs.py --include-examples
