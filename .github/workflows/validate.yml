name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-and-policy:
    name: schema + policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema

      - name: Validate job specs
        run: python scripts/validate_jobs.py

      - name: Validate example
        run: python scripts/validate_jobs.py --include-examples
