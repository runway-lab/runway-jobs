name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-and-policy:
    name: schema + policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml jsonschema pytest

      - name: Run validator unit tests
        run: python -m pytest tests/ -q

      - name: Validate job specs
        env:
          # On pull_request events, every spec in jobs/ must declare
          # metadata.owner == the PR author. Empty for push/dispatch
          # (where there's no PR author and the check is skipped).
          VALIDATOR_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: python scripts/validate_jobs.py

      - name: Validate example
        run: python scripts/validate_jobs.py --include-examples
