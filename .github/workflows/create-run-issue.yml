name: create-run-issue

# Opens a tracking issue per newly-merged job spec. Agents post their
# live status comments into this issue (one comment per agent, edited).
#
# Triggered on PR close (merge) rather than push to main because pushes
# initiated by the GITHUB_TOKEN (which is how the auto-merge workflow
# merges PRs) do NOT trigger other workflows. pull_request_target fires
# regardless of who/how the merge happens.
on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  open-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Open issue for each newly-added job spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          # Files added in this PR under jobs/.
          added=$(gh api "repos/$REPO/pulls/$PR/files" \
            --paginate \
            --jq '.[] | select(.status == "added" and (.filename | startswith("jobs/")) and (.filename | endswith(".yaml"))) | .filename')

          if [ -z "$added" ]; then
            echo "No newly-added jobs/*.yaml in PR #$PR; nothing to do."
            exit 0
          fi

          python3 -m pip install --quiet pyyaml

          while IFS= read -r path; do
            [ -z "$path" ] && continue
            run_id=$(basename "$path" .yaml)
            echo "::group::Opening issue for $run_id"

            python3 - "$path" "$run_id" <<'PY'
          import os, pathlib, subprocess, sys
          import yaml

          path = pathlib.Path(sys.argv[1])
          run_id = sys.argv[2]
          repo = os.environ["REPO"]
          sha = os.environ["SHA"]

          spec = yaml.safe_load(path.read_text())
          md = spec["metadata"]
          sp = spec["spec"]
          backends = sp["backends"]
          owner = md["owner"]

          title = f"[run] {md['name']} by @{owner}"
          spec_url = f"https://github.com/{repo}/blob/{sha}/{path}"
          body = "\n".join([
              f"**Run ID:** `{run_id}`",
              f"**Owner:** @{owner}",
              f"**Spec:** [{path}]({spec_url}) (at `{sha[:8]}`)",
              f"**Resources:** {sp['resources']['gpus']}× {sp['resources']['gpu_type']}, max {sp['resources']['max_hours']}h",
              f"**Backends:** {', '.join(backends)}",
              f"**Selection:** {sp['selection']['policy']} (profile {sp['selection']['profile_seconds']}s)",
              "",
              "Agents will post their live status as comments on this issue.",
              "Opened automatically by `.github/workflows/create-run-issue.yml`.",
          ])

          labels = ["run", "status:running"] + [f"backend:{b}" for b in backends]
          for lab in labels:
              subprocess.run(
                  ["gh", "label", "create", lab, "--repo", repo, "--force"],
                  capture_output=True,
              )

          subprocess.run(
              ["gh", "issue", "create", "--repo", repo,
               "--title", title, "--body", body,
               "--label", ",".join(labels)],
              check=True,
          )
          PY

            echo "::endgroup::"
          done <<< "$added"
