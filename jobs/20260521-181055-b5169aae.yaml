apiVersion: runway/v1alpha1
kind: Experiment
metadata:
  name: hf-e2e-demo
  owner: jurray-jiajun
spec:
  code:
    repo: runway-lab/jurray-experiments
    ref: dbc900ce689fd305e224ac1a95948dd2b13338a9
  resources:
    gpus: 0
    gpu_type: any
    max_hours: 1.0
  backends:
  - ssh
  selection:
    policy: eta
    profile_seconds: 0
  run: 'set -e

    python3 -m pip install --user --quiet -r requirements.txt 2>&1 | tail -2 || true

    export PATH="$HOME/.local/bin:$PATH"

    export DEMO_STEPS=15

    export DEMO_STEP_SECONDS=3

    export WANDB_PROJECT=runway-smoke

    python3 train.py

    '
  artifacts:
    uri: gs://${ARTIFACTS_BUCKET}/runs/{run_id}/candidates/{backend_id}/
