apiVersion: runway/v1alpha1
kind: Experiment
metadata:
  name: slurm-smoke
  owner: zhuconv
spec:
  code:
    repo: runway-lab/zhuconv-experiments
    ref: main
  resources:
    gpus: 0
    gpu_type: any
    max_hours: 1.0
  backends:
  - slurm
  selection:
    policy: eta
    profile_seconds: 0
  run: 'set -e

    echo "hello from slurm compute node"

    hostname

    echo ''{"step": 1, "total_steps": 1}''

    '
  artifacts:
    uri: gs://${ARTIFACTS_BUCKET}/runs/{run_id}/candidates/{backend_id}/
