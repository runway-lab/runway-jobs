apiVersion: runway/v1alpha1
kind: Experiment
metadata:
  name: e2e-smoke
  owner: jurray-jiajun
spec:
  code:
    repo: runway-lab/example-project
    ref: main
  resources:
    gpus: 0
    gpu_type: any
    max_hours: 1.0
  backends:
  - ssh
  selection:
    policy: eta
    profile_seconds: 0
  run: "set -e\ntotal=12\necho \"starting e2e smoke; will emit progress for ~60s\"\
    \nfor i in $(seq 1 $total); do\n  step=$((i * 8))\n  echo \"{\\\"step\\\": $step,\
    \ \\\"total_steps\\\": 100, \\\"ts\\\": $(date +%s)}\"\n  sleep 5\ndone\necho\
    \ \"{\\\"step\\\": 100, \\\"total_steps\\\": 100, \\\"ts\\\": $(date +%s)}\"\n\
    echo \"all done\"\n"
  artifacts:
    uri: gs://${ARTIFACTS_BUCKET}/runs/{run_id}/candidates/{backend_id}/
