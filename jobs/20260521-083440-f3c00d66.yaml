apiVersion: runway/v1alpha1
kind: Experiment
metadata:
  name: e2e-with-issue-final
  owner: jurray-jiajun
spec:
  code:
    repo: runway-lab/example-project
    ref: main
  resources:
    gpus: 0
    gpu_type: any
    max_hours: 1.0
  backends:
  - ssh
  selection:
    policy: eta
    profile_seconds: 0
  run: "set -e\ntotal=10\necho \"final round: issue should exist by the time agent\
    \ reaches lookup\"\nfor i in $(seq 1 $total); do\n  step=$((i * 10))\n  echo \"\
    {\\\"step\\\": $step, \\\"total_steps\\\": 100, \\\"ts\\\": $(date +%s)}\"\n \
    \ sleep 5\ndone\necho \"{\\\"step\\\": 100, \\\"total_steps\\\": 100, \\\"ts\\\
    \": $(date +%s)}\"\necho \"complete!\"\n"
  artifacts:
    uri: gs://${ARTIFACTS_BUCKET}/runs/{run_id}/candidates/{backend_id}/
